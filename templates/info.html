<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ title }} — DOK74 Verhuur</title>
  <style>
    :root {
      --yellow:      #F5C900;
      --yellow-dark: #C9A400;
      --yellow-soft: #FFFBE6;
      --grey-900:    #2A2A2A;
      --grey-700:    #585858;
      --grey-500:    #8A8A8A;
      --grey-200:    #E8E8E8;
      --grey-100:    #F5F5F5;
      --white:       #FFFFFF;
      --shadow:      0 2px 16px rgba(0,0,0,.07);
      --radius:      12px;
      --radius-sm:   8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--white); color: var(--grey-900); min-height: 100vh;
    }

    header { background: var(--white); border-bottom: 1px solid var(--grey-200); box-shadow: 0 1px 6px rgba(0,0,0,.05); }
    .header-inner {
      max-width: 1040px; margin: 0 auto; padding: 0 24px;
      display: flex; align-items: center; justify-content: space-between; height: 56px;
    }
    .back-link {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: .84rem; font-weight: 600; color: var(--grey-700);
      text-decoration: none; padding: 7px 13px;
      border-radius: var(--radius-sm); border: 1px solid var(--grey-200);
      transition: border-color .15s, background .15s;
    }
    .back-link:hover { border-color: var(--yellow); background: var(--yellow-soft); }
    .header-phone {
      display: flex; align-items: center; gap: 7px; font-size: .85rem; color: var(--grey-700);
      text-decoration: none; padding: 7px 13px; border-radius: var(--radius-sm);
      border: 1px solid var(--grey-200); transition: border-color .15s, background .15s;
    }
    .header-phone:hover { border-color: var(--yellow); background: var(--yellow-soft); }

    .hero { background: var(--white); border-bottom: 3px solid var(--yellow); padding: 32px 24px 28px; text-align: center; }
    .hero-inner { max-width: 640px; margin: 0 auto; }
    .hero h1 { font-size: clamp(1.4rem, 3vw, 1.85rem); font-weight: 800; letter-spacing: -.03em; color: var(--grey-900); }

    main { max-width: 640px; margin: 0 auto; padding: 32px 20px 72px; }

    .info-card {
      background: var(--white); border: 1px solid var(--grey-200);
      border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow);
    }
    .info-card h3 { font-size: 1rem; font-weight: 800; color: var(--grey-900); margin: 20px 0 10px; }
    .info-card h3:first-child { margin-top: 0; }
    .info-card p { font-size: .9rem; color: var(--grey-700); line-height: 1.7; margin-bottom: 12px; }
    .info-card p:last-child { margin-bottom: 0; }
    .info-card ul, .info-card ol { margin: 0 0 12px 18px; }
    .info-card li { font-size: .88rem; color: var(--grey-700); line-height: 1.7; margin-bottom: 4px; }
    .info-card strong { color: var(--grey-900); }
    .info-card em { color: var(--grey-500); }
    .info-box {
      background: var(--yellow-soft); border-left: 3px solid var(--yellow);
      padding: 14px 16px; border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      margin: 16px 0; font-size: .88rem; color: var(--grey-700); line-height: 1.6;
    }
    .btn-outline {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: transparent; color: var(--grey-700); border: 1.5px solid var(--grey-200);
      border-radius: var(--radius-sm); padding: 10px 20px;
      font-size: .88rem; font-weight: 600; font-family: inherit;
      cursor: pointer; margin-top: 16px; text-decoration: none;
      transition: border-color .15s, background .15s;
    }
    .btn-outline:hover { border-color: var(--yellow); background: var(--yellow-soft); }
    .btn-primary {
      display: inline-flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--yellow); color: var(--grey-900); border: none;
      border-radius: var(--radius-sm); padding: 11px 22px;
      font-size: .88rem; font-weight: 700; font-family: inherit;
      cursor: pointer; margin-top: 16px; text-decoration: none;
      transition: background .15s, transform .12s;
    }
    .btn-primary:hover { background: var(--yellow-dark); transform: translateY(-1px); }

    footer {
      text-align: center; padding: 28px 20px; font-size: .84rem;
      color: var(--grey-700); border-top: 2px solid var(--yellow); background: var(--white);
    }
    footer a { color: var(--grey-900); font-weight: 500; }
  </style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="{{ back_url }}" class="back-link">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M15 18l-6-6 6-6"/></svg>
      Terug
    </a>
    <a href="tel:0854011736" class="header-phone">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.6 3.42 2 2 0 0 1 3.59 1.21l3-.03a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 9a16 16 0 0 0 6.09 6.09l1.36-1.36a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
      085 401 1736
    </a>
  </div>
</header>

<section class="hero">
  <div class="hero-inner">
    <h1>{{ title }}</h1>
  </div>
</section>

<main>
  <div class="info-card">
    {{ content | safe }}

    {% if contact_url %}
    <a href="{{ contact_url }}" class="btn-primary">
      <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
      Heeft u nog een vraag? Neem contact op
    </a>
    {% endif %}
  </div>
</main>

<footer>
  &copy; 2026 DOK74 Verhuur BV &nbsp;&middot;&nbsp;
  <a href="tel:0854011736">085 401 1736</a> &nbsp;&middot;&nbsp;
  <a href="mailto:info@dok74verhuur.nl">info@dok74verhuur.nl</a>
</footer>

</body>
</html>
